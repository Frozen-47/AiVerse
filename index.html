<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />
    
    <!-- Basic SEO -->
    <meta name="description" content="AiVerse is a comprehensive AI Knowledge Encyclopedia. Explore the latest in Artificial Intelligence, machine learning, neural networks, and more." />
    <meta name="keywords" content="AI, Artificial Intelligence, Machine Learning, Encyclopedia, Neural Networks, Technology" />
    <meta name="author" content="AiVerse" />

    <!-- Open Graph / Facebook / WhatsApp / LinkedIn -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://aiverse.frozenn.in/" />
    <meta property="og:title" content="AiVerse - AI Knowledge Encyclopedia" />
    <meta property="og:description" content="Explore the definitive AI Knowledge Encyclopedia. Discover machine learning, neural networks, and the future of technology." />
    <meta property="og:image" content="/card.png" />

    <!-- Twitter / Discord -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://aiverse.frozenn.in/" />
    <meta property="twitter:title" content="AiVerse - AI Knowledge Encyclopedia" />
    <meta property="twitter:description" content="Explore the definitive AI Knowledge Encyclopedia. Discover machine learning, neural networks, and the future of technology." />
    <meta property="twitter:image" content="/card.png" />

    <!-- Advanced SEO -->
    <link rel="canonical" href="https://aiverse.frozenn.in/" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="language" content="English">
    
    <!-- Apple/Mobile Optimization -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AiVerse" />
    <meta name="application-name" content="AiVerse" />
    
    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "AiVerse",
      "url": "https://aiverse.frozenn.in/",
      "description": "Explore the definitive AI Knowledge Encyclopedia. Discover machine learning, neural networks, and the future of technology.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://aiverse.frozenn.in/?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Preconnect & Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&display=swap" rel="stylesheet">
    
    <title>AiVerse - AI Knowledge Encyclopedia</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
